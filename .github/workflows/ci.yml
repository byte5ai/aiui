name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  companion:
    name: Tauri companion (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            label: macOS arm64
            build_bundle: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x86_64
            build_bundle: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: companion/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: companion/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend deps
        working-directory: companion
        run: npm ci

      - name: Svelte type-check
        working-directory: companion
        run: npx svelte-check --tsconfig ./tsconfig.json --threshold error

      - name: Vite build
        working-directory: companion
        run: npm run build

      - name: Cargo check
        working-directory: companion/src-tauri
        run: cargo check --release --target ${{ matrix.target }}

      - name: Cargo test
        working-directory: companion/src-tauri
        run: cargo test --lib --release --target ${{ matrix.target }}

      - name: Cargo clippy
        working-directory: companion/src-tauri
        run: cargo clippy --release --target ${{ matrix.target }} -- -D warnings

      # Windows-only: produce a real NSIS installer so we can hand the
      # `.exe` to a tester or run it on a Windows VM. Mac CI stays
      # bundle-less — releases are still cut manually via scripts/release.sh.
      - name: Install Tauri CLI
        if: matrix.build_bundle
        run: npm install --global @tauri-apps/cli@^2

      - name: Tauri build (NSIS)
        if: matrix.build_bundle
        working-directory: companion
        run: tauri build --target ${{ matrix.target }} --bundles nsis

      - name: Upload NSIS installer
        if: matrix.build_bundle
        uses: actions/upload-artifact@v4
        with:
          name: aiui-windows-x86_64-nsis
          path: |
            companion/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            companion/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.sig
          if-no-files-found: error
          retention-days: 14

  mcp:
    name: aiui-mcp (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Run unit tests
        working-directory: python
        run: uv run --extra dev pytest tests/ -v

      - name: Build wheel + sdist
        working-directory: python
        run: uv build

      - name: Install wheel and smoke-check entry point
        working-directory: python
        run: |
          uv tool install --force ./dist/aiui_mcp-*.whl
          which aiui-mcp
          # initialize handshake — timeout after 2s
          (printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}'; sleep 1) \
            | timeout 5 aiui-mcp | head -2
